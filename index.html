<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfume Product Card</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page">
    <div class="card">

      <div class="card__image"></div>

      <div class="card__content">
        <p class="card__category">Perfume</p>

        <h1 class="card__title">Gabrielle Essence Eau De Parfum</h1>

        <p class="card__desc">
          A floral, solar and voluptuous interpretation composed by
          Olivier Polge, Perfumer-Creator for the House of CHANEL.
        </p>

        <div class="card__pricing">
          <span class="price--current">$149.99</span>
          <span class="price--original">$169.99</span>
        </div>

        <button class="btn-cart">
          <i class="fas fa-shopping-cart"></i>
          Add to Cart
        </button>
      </div>

    </div>
  </div>

</body>
</html>
